appId: com.radiosankt.app
productName: Radio Sankt
icon: public/icon.png
electronDist: node_modules/electron/dist
directories:
  output: release
files:
  - dist/**/*
  - package.json
extraResources:
  - from: node_modules/electron/dist/WidevineCdm
    to: WidevineCdm
afterPack: scripts/electron-builder-after-pack.cjs
afterSign: scripts/electron-builder-after-sign.cjs
mac:
  icon: public/icon.png
  category: public.app-category.music
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  target:
    - dmg
    - zip
win:
  target:
    - nsis
linux:
  target:
    - AppImage
publish:
  provider: github
  owner: SillyDevz
  repo: RadioSankt

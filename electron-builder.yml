appId: com.radiosankt.app
productName: Radio Sankt
# electron-updater fetches assets by the exact URL written in latest.yml, but
# GitHub releases normalize spaces in uploaded file names to dots. Use an
# artifactName without spaces so both sides match.
artifactName: radio-sankt-${version}-${os}-${arch}.${ext}
icon: public/icon.png
electronDist: node_modules/electron/dist
directories:
  output: release
files:
  - dist/**/*
  - package.json
afterPack: scripts/electron-builder-after-pack.cjs
afterSign: scripts/electron-builder-after-sign.cjs
mac:
  icon: public/icon.png
  category: public.app-category.music
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  target:
    - dmg
    - zip
win:
  target:
    - nsis
  artifactName: radio-sankt-setup-${version}.${ext}
linux:
  target:
    - AppImage
publish:
  provider: github
  owner: SillyDevz
  repo: RadioSankt

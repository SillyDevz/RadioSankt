name: Build and Release

# This workflow runs when:
# - a version tag is pushed (e.g. `git tag v0.1.3 && git push origin v0.1.3`)
# - a GitHub Release is published from the UI/API
# In both cases it builds and uploads .dmg / .exe assets to the release.
on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]

concurrency:
  group: release-${{ github.event.release.tag_name || github.ref_name }}
  cancel-in-progress: true

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - run: npm ci

      # Ensure the installer and latest.yml pick up the tagged version even if
      # package.json hasn't been bumped yet. Runs on tag push OR when a Release
      # is published from the UI (otherwise artifacts keep the old package.json version).
      - name: Sync package version from tag
        if: ${{ (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) || github.event_name == 'release' }}
        run: node ./scripts/sync-version-from-tag.cjs "${{ github.event.release.tag_name || github.ref_name }}"

      - name: Package
        run: npm run electron:build:mac -- --publish never
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - uses: actions/upload-artifact@v4
        with:
          name: release-mac
          path: |
            release/*.dmg
            release/*.zip
            release/*.yml
            release/*.blockmap

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - run: npm ci

      - name: Sync package version from tag
        if: ${{ (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) || github.event_name == 'release' }}
        run: node ./scripts/sync-version-from-tag.cjs "${{ github.event.release.tag_name || github.ref_name }}"

      - name: Package
        run: npm run electron:build:win -- --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: |
            release/*.exe
            release/*.yml
            release/*.blockmap

  publish:
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: release-mac
          path: release

      - uses: actions/download-artifact@v4
        with:
          name: release-windows
          path: release

      - name: Verify installers exist before upload
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          installers=(release/*.exe release/*.dmg)
          if [[ ${#installers[@]} -eq 0 ]]; then
            echo "::error::No .exe or .dmg under release/. Build jobs may have failed or artifact paths are wrong."
            ls -la release/ 2>/dev/null || echo "(release/ missing)"
            exit 1
          fi
          printf 'Uploading: %s\n' "${installers[@]}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

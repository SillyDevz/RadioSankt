name: Build and Release

# Pushing a *git tag* (e.g. `git tag v0.1.3 && git push origin v0.1.3`) runs this workflow
# and uploads .dmg / .exe to the GitHub Release for that tag.
# Creating a release only from the GitHub UI does not run this workflow — you still only get "Source code" zips.
on:
  push:
    tags:
      - 'v*'

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - run: npm ci

      - name: Install Castlabs EVS
        run: python3 -m pip install --upgrade castlabs-evs

      - name: Ensure macOS signing secrets are configured
        env:
          CASTLABS_ACCOUNT_NAME: ${{ secrets.CASTLABS_ACCOUNT_NAME }}
          CASTLABS_ACCOUNT_PASSWORD: ${{ secrets.CASTLABS_ACCOUNT_PASSWORD }}
        run: |
          test -n "$CASTLABS_ACCOUNT_NAME" || { echo "Missing CASTLABS_ACCOUNT_NAME secret."; exit 1; }
          test -n "$CASTLABS_ACCOUNT_PASSWORD" || { echo "Missing CASTLABS_ACCOUNT_PASSWORD secret."; exit 1; }

      - name: Package
        run: npm run electron:build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CASTLABS_ACCOUNT_NAME: ${{ secrets.CASTLABS_ACCOUNT_NAME }}
          CASTLABS_ACCOUNT_PASSWORD: ${{ secrets.CASTLABS_ACCOUNT_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - uses: actions/upload-artifact@v4
        with:
          name: release-mac
          path: |
            release/*.dmg
            release/*.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - run: npm ci

      - name: Install Castlabs EVS
        shell: pwsh
        run: python -m pip install --upgrade castlabs-evs

      - name: Ensure Windows EVS secrets are configured
        shell: pwsh
        env:
          CASTLABS_ACCOUNT_NAME: ${{ secrets.CASTLABS_ACCOUNT_NAME }}
          CASTLABS_ACCOUNT_PASSWORD: ${{ secrets.CASTLABS_ACCOUNT_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:CASTLABS_ACCOUNT_NAME) -or [string]::IsNullOrWhiteSpace($env:CASTLABS_ACCOUNT_PASSWORD)) {
            throw "Missing CASTLABS_ACCOUNT_NAME or CASTLABS_ACCOUNT_PASSWORD secret. Refusing to build a Windows installer without EVS."
          }

      - name: Package
        run: npm run electron:build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
          CASTLABS_ACCOUNT_NAME: ${{ secrets.CASTLABS_ACCOUNT_NAME }}
          CASTLABS_ACCOUNT_PASSWORD: ${{ secrets.CASTLABS_ACCOUNT_PASSWORD }}

      - uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: |
            release/*.exe
            release/*.yml
            release/*.blockmap

  publish:
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: release-mac
          path: release

      - uses: actions/download-artifact@v4
        with:
          name: release-windows
          path: release

      - name: Verify installers exist before upload
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          installers=(release/*.exe release/*.dmg)
          if [[ ${#installers[@]} -eq 0 ]]; then
            echo "::error::No .exe or .dmg under release/. Build jobs may have failed or artifact paths are wrong."
            ls -la release/ 2>/dev/null || echo "(release/ missing)"
            exit 1
          fi
          printf 'Uploading: %s\n' "${installers[@]}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
